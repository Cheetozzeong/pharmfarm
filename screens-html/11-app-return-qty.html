<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱 · 반품 · B5 반품 수량 입력</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#EEF0F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit;}
@keyframes scan{0%{top:9%}50%{top:84%}100%{top:9%}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style></head><body>
<div style="position:relative;width:320px;height:690px;border-radius:42px;overflow:hidden;box-shadow:0 14px 44px rgba(16,24,28,.20);background:#F6F7F8;border:1px solid #E6E9EB;display:flex;flex-direction:column;">
          <div style="display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 28px;color:#14181B;flex:none;background:#fff;">
            <span style="font:600 15px Pretendard;">9:41</span>
            <span style="display:flex;gap:7px;align-items:center;"><span style="font:600 11px Pretendard;">5G</span><span style="display:inline-block;width:24px;height:12px;border:1.5px solid #14181B;border-radius:3px;position:relative;"><span style="position:absolute;top:2px;left:2px;bottom:2px;width:66%;background:#14181B;border-radius:1px;"></span></span></span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:6px 18px 14px;flex:none;background:#fff;border-bottom:1px solid #F1F3F4;">
            <button style="width:9px;height:9px;flex:none;border-left:2px solid #14181B;border-bottom:2px solid #14181B;transform:rotate(45deg);"></button>
            <span style="font:700 18px Pretendard;letter-spacing:-.01em;">반품 수량</span>
          </div>
          <div style="flex:1;overflow:hidden;padding:16px 16px 0;">
            <div style="background:#fff;border:1px solid #EEF1F2;border-radius:16px;padding:15px;margin-bottom:14px;">
              <div style="font:700 16px Pretendard;color:#14181B;margin-bottom:4px;">타이레놀정 500mg</div>
              <div style="display:flex;align-items:center;gap:8px;"><span style="padding:2px 8px;border-radius:999px;font:600 11px Pretendard;background:#EFF5FF;color:#0050CC;">확정</span><span style="font:500 13px Pretendard;color:#8E98A1;">한미약품 A도매</span></div>
            </div>
            <div style="background:#fff;border:1px solid #EEF1F2;border-radius:16px;padding:20px 16px;text-align:center;margin-bottom:14px;">
              <div style="font:500 12px Pretendard;color:#8E98A1;margin-bottom:16px;">반품 수량 <span style="color:#0064FF;font-weight:700;">(최대 30)</span></div>
              <div style="display:flex;align-items:center;justify-content:center;gap:24px;">
                <button style="width:48px;height:48px;border-radius:50%;background:#F4F5F6;color:#48515A;font:700 24px Pretendard;display:flex;align-items:center;justify-content:center;">−</button>
                <span style="font:800 44px Pretendard;color:#14181B;min-width:64px;">10</span>
                <button style="width:48px;height:48px;border-radius:50%;background:#EFF5FF;color:#0064FF;font:700 24px Pretendard;display:flex;align-items:center;justify-content:center;">+</button>
              </div>
            </div>
            <div style="background:#fff;border:1px solid #EEF1F2;border-radius:16px;padding:14px 15px;">
              <div style="font:500 12px Pretendard;color:#8E98A1;margin-bottom:8px;">메모 (선택)</div>
              <div style="font:500 14px Pretendard;color:#14181B;">유통기한 임박 반품</div>
            </div>
          </div>
          <div style="flex:none;padding:14px 18px 28px;background:#fff;border-top:1px solid #F1F3F4;">
            <div style="display:flex;justify-content:space-between;margin-bottom:12px;"><span style="font:500 13px Pretendard;color:#8E98A1;">반품 후 재고</span><span style="font:700 14px Pretendard;color:#14181B;">30 → 20개</span></div>
            <button style="width:100%;padding:16px;border-radius:14px;background:#0064FF;color:#fff;font:700 15px Pretendard;box-shadow:0 6px 16px rgba(0,100,255,.30);">10개 반품하기</button>
          </div>
        </div>
</body></html>
