<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱 · 입고 · A1 메인(촬영 홈)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#EEF0F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit;}
@keyframes scan{0%{top:9%}50%{top:84%}100%{top:9%}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style></head><body>
<div style="position:relative;width:320px;height:690px;border-radius:42px;overflow:hidden;box-shadow:0 14px 44px rgba(16,24,28,.20);background:radial-gradient(120% 70% at 50% 38%,#1C2226 0%,#0C0E0F 72%);display:flex;flex-direction:column;">
          <div style="display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 28px;color:#fff;flex:none;">
            <span style="font:600 15px Pretendard;">9:41</span>
            <span style="display:flex;gap:7px;align-items:center;"><span style="font:600 11px Pretendard;">5G</span><span style="display:inline-block;width:24px;height:12px;border:1.5px solid #fff;border-radius:3px;position:relative;opacity:.95;"><span style="position:absolute;top:2px;left:2px;bottom:2px;width:66%;background:#fff;border-radius:1px;"></span></span></span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 18px 0;flex:none;">
            <button style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);border-radius:999px;color:#fff;font:600 13px Pretendard;">
              <span style="width:7px;height:7px;border-radius:50%;flex:none;background:#FFB44D;box-shadow:0 0 8px #FFB44D;"></span>도매처 선택 필요
              <span style="width:6px;height:6px;flex:none;border-right:2px solid rgba(255,255,255,.7);border-bottom:2px solid rgba(255,255,255,.7);transform:rotate(45deg);margin-left:2px;"></span>
            </button>
            <button style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);color:#fff;font:700 16px Pretendard;">?</button>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;position:relative;">
            <div style="position:relative;width:236px;height:236px;">
              <span style="position:absolute;top:0;left:0;width:38px;height:38px;border-top:3px solid #4D9AFF;border-left:3px solid #4D9AFF;border-top-left-radius:16px;"></span>
              <span style="position:absolute;top:0;right:0;width:38px;height:38px;border-top:3px solid #4D9AFF;border-right:3px solid #4D9AFF;border-top-right-radius:16px;"></span>
              <span style="position:absolute;bottom:0;left:0;width:38px;height:38px;border-bottom:3px solid #4D9AFF;border-left:3px solid #4D9AFF;border-bottom-left-radius:16px;"></span>
              <span style="position:absolute;bottom:0;right:0;width:38px;height:38px;border-bottom:3px solid #4D9AFF;border-right:3px solid #4D9AFF;border-bottom-right-radius:16px;"></span>
              <span style="position:absolute;left:6%;right:6%;height:2px;background:linear-gradient(90deg,transparent,#4D9AFF,transparent);box-shadow:0 0 14px #4D9AFF;animation:scan 2.6s ease-in-out infinite;"></span>
            </div>
            <div style="text-align:center;">
              <div style="font:600 15px Pretendard;color:#fff;margin-bottom:6px;">QR 코드를 사각형 안에 맞춰주세요</div>
              <div style="font:500 13px Pretendard;color:rgba(255,255,255,.55);">코드가 인식되면 자동으로 스캔됩니다</div>
            </div>
          </div>
          <div style="position:absolute;left:18px;right:18px;bottom:110px;background:rgba(255,180,77,.16);border:1px solid rgba(255,180,77,.4);border-radius:14px;padding:13px 15px;backdrop-filter:blur(8px);">
            <div style="font:600 13px Pretendard;color:#FFD8A0;">먼저 도매처를 선택하세요</div>
            <div style="font:500 12px Pretendard;color:rgba(255,216,160,.75);margin-top:2px;">입고할 약품의 도매처를 선택해야 스캔할 수 있어요.</div>
          </div>
          <div style="flex:none;display:flex;justify-content:center;padding:0 0 30px;">
            <div style="display:flex;gap:4px;padding:5px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.16);border-radius:999px;backdrop-filter:blur(8px);">
              <button style="padding:9px 26px;border-radius:999px;background:#fff;color:#0C0E0F;font:700 14px Pretendard;">입고</button>
              <button style="padding:9px 26px;border-radius:999px;color:rgba(255,255,255,.7);font:600 14px Pretendard;">반품</button>
            </div>
          </div>
        </div>
</body></html>
