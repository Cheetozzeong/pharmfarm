<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱 · 반품 · B4 후보 없음</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#EEF0F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit;}
@keyframes scan{0%{top:9%}50%{top:84%}100%{top:9%}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style></head><body>
<div style="position:relative;width:320px;height:690px;border-radius:42px;overflow:hidden;box-shadow:0 14px 44px rgba(16,24,28,.20);background:#0C0E0F;display:flex;flex-direction:column;">
          <div style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
          <div style="position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:26px 26px 42px 42px;padding:10px 24px 28px;display:flex;flex-direction:column;height:56%;">
            <div style="width:40px;height:4px;border-radius:2px;background:#E0E4E6;margin:4px auto 22px;"></div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
              <div style="width:76px;height:76px;border-radius:50%;background:#EEF0F2;display:flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative;">
                <span style="position:absolute;width:34px;height:3px;border-radius:2px;background:#9AA3AA;transform:rotate(45deg);"></span>
                <span style="width:30px;height:30px;border:3px solid #9AA3AA;border-radius:50%;"></span>
              </div>
              <div style="font:800 19px Pretendard;letter-spacing:-.01em;color:#14181B;margin-bottom:8px;">판매처 후보를 찾지 못했습니다</div>
              <p style="font:500 13px/1.6 Pretendard;color:#8E98A1;margin:0;">입고·구매 내역에 근거가 없어 반품 대상으로 등록할 수 없습니다. 구매 내역을 먼저 동기화하거나 코드를 다시 확인해 주세요.</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:10px;">
              <button style="width:100%;padding:16px;border-radius:14px;background:#0064FF;color:#fff;font:700 15px Pretendard;">다시 스캔</button>
              <button style="width:100%;padding:14px;border-radius:14px;background:#F4F5F6;color:#48515A;font:700 14px Pretendard;">닫기</button>
            </div>
          </div>
        </div>
</body></html>
