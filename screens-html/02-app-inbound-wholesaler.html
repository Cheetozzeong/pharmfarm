<style>

<div style="position:relative;width:320px;height:690px;border-radius:42px;overflow:hidden;box-shadow:0 14px 44px rgba(16,24,28,.20);background:#fff;border:1px solid #E6E9EB;display:flex;flex-direction:column;">

              <span style="width:20px;height:20px;border-radius:50%;border:2px solid #CBD2D7;flex:none;"></span>
              <span style="flex:1;"><span style="display:block;font:700 14px Pretendard;color:#14181B;">지오영 도매</span><span style="display:block;font:500 12px Pretendard;color:#8E98A1;margin-top:2px;">공통 · 경기 성남</span></span>

            <div style="font:700 11px Pretendard;letter-spacing:.06em;color:#8E98A1;margin:16px 4px 8px;">약국 등록 도매처</div>

        </div>
</body></html>
