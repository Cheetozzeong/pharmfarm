<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱 · 반품 · B1 반품 스캔</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#EEF0F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit;}
@keyframes scan{0%{top:9%}50%{top:84%}100%{top:9%}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style></head><body>
<div style="position:relative;width:320px;height:690px;border-radius:42px;overflow:hidden;box-shadow:0 14px 44px rgba(16,24,28,.20);background:radial-gradient(120% 70% at 50% 38%,#1C2226 0%,#0C0E0F 72%);display:flex;flex-direction:column;">
          <div style="display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 28px;color:#fff;flex:none;">
            <span style="font:600 15px Pretendard;">9:41</span>
            <span style="display:flex;gap:7px;align-items:center;"><span style="font:600 11px Pretendard;">5G</span><span style="display:inline-block;width:24px;height:12px;border:1.5px solid #fff;border-radius:3px;position:relative;opacity:.95;"><span style="position:absolute;top:2px;left:2px;bottom:2px;width:66%;background:#fff;border-radius:1px;"></span></span></span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 18px 0;flex:none;">
            <div style="font:700 16px Pretendard;color:#fff;">반품</div>
            <button style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);color:#fff;font:700 16px Pretendard;">?</button>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;">
            <div style="position:relative;width:236px;height:236px;">
              <span style="position:absolute;top:0;left:0;width:38px;height:38px;border-top:3px solid #FFB44D;border-left:3px solid #FFB44D;border-top-left-radius:16px;"></span>
              <span style="position:absolute;top:0;right:0;width:38px;height:38px;border-top:3px solid #FFB44D;border-right:3px solid #FFB44D;border-top-right-radius:16px;"></span>
              <span style="position:absolute;bottom:0;left:0;width:38px;height:38px;border-bottom:3px solid #FFB44D;border-left:3px solid #FFB44D;border-bottom-left-radius:16px;"></span>
              <span style="position:absolute;bottom:0;right:0;width:38px;height:38px;border-bottom:3px solid #FFB44D;border-right:3px solid #FFB44D;border-bottom-right-radius:16px;"></span>
              <span style="position:absolute;left:6%;right:6%;height:2px;background:linear-gradient(90deg,transparent,#FFB44D,transparent);box-shadow:0 0 14px #FFB44D;animation:scan 2.6s ease-in-out infinite;"></span>
            </div>
            <div style="text-align:center;">
              <div style="font:600 15px Pretendard;color:#fff;margin-bottom:6px;">반품할 약품의 QR을 스캔하세요</div>
              <div style="font:500 13px Pretendard;color:rgba(255,255,255,.55);">입고 이력 또는 구매 내역에서 판매처를 찾아드려요</div>
            </div>
          </div>
          <div style="flex:none;display:flex;justify-content:center;padding:0 0 30px;">
            <div style="display:flex;gap:4px;padding:5px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.16);border-radius:999px;backdrop-filter:blur(8px);">
              <button style="padding:9px 26px;border-radius:999px;color:rgba(255,255,255,.7);font:600 14px Pretendard;">입고</button>
              <button style="padding:9px 26px;border-radius:999px;background:#fff;color:#0C0E0F;font:700 14px Pretendard;">반품</button>
            </div>
          </div>
        </div>
</body></html>
