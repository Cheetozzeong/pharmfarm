<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱 · 반품 · B3 조회(추정)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#EEF0F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit;}
@keyframes scan{0%{top:9%}50%{top:84%}100%{top:9%}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style></head><body>
<div style="position:relative;width:320px;height:690px;border-radius:42px;overflow:hidden;box-shadow:0 14px 44px rgba(16,24,28,.20);background:#0C0E0F;display:flex;flex-direction:column;">
          <div style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
          <div style="position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:26px 26px 42px 42px;padding:10px 20px 28px;display:flex;flex-direction:column;height:74%;">
            <div style="width:40px;height:4px;border-radius:2px;background:#E0E4E6;margin:4px auto 16px;"></div>
            <span style="align-self:flex-start;display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;font:700 12px Pretendard;background:#FBF1DE;color:#8A5A0E;margin-bottom:12px;"><span style="width:7px;height:7px;border-radius:50%;flex:none;background:#B07514;"></span>추정 · 입고 이력 없음</span>
            <div style="font:800 19px Pretendard;letter-spacing:-.01em;color:#14181B;margin-bottom:6px;">예시약 30T</div>
            <p style="font:500 12px/1.5 Pretendard;color:#8E98A1;margin:0 0 16px;">입고 이력은 없지만, 구매 내역 기준으로 아래 판매처가 추정됩니다. 하나를 선택해 주세요.</p>
            <div style="font:700 11px Pretendard;letter-spacing:.06em;color:#8E98A1;margin:0 2px 9px;">판매처 후보 2</div>
            <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;gap:9px;">
              <button style="display:flex;align-items:flex-start;gap:12px;padding:14px;border:1.5px solid #0064FF;background:#EFF5FF;border-radius:14px;text-align:left;">
                <span style="width:19px;height:19px;border-radius:50%;border:6px solid #0064FF;flex:none;margin-top:1px;"></span>
                <span style="flex:1;"><span style="display:block;font:700 14px Pretendard;color:#14181B;">한미약품 A도매</span><span style="display:block;font:500 11px Pretendard;color:#8E98A1;margin-top:3px;">2026-01-10 · 예시약 30T · 30개</span></span>
              </button>
              <button style="display:flex;align-items:flex-start;gap:12px;padding:14px;border:1px solid #EEF1F2;background:#fff;border-radius:14px;text-align:left;">
                <span style="width:19px;height:19px;border-radius:50%;border:2px solid #CBD2D7;flex:none;margin-top:1px;"></span>
                <span style="flex:1;"><span style="display:block;font:700 14px Pretendard;color:#14181B;">지오영 도매</span><span style="display:block;font:500 11px Pretendard;color:#8E98A1;margin-top:3px;">2025-11-22 · 예시약 30정 · 60개</span></span>
              </button>
            </div>
            <div style="margin-top:14px;">
              <button style="width:100%;padding:16px;border-radius:14px;background:#0064FF;color:#fff;font:700 15px Pretendard;box-shadow:0 6px 16px rgba(0,100,255,.30);">선택한 판매처로 진행</button>
            </div>
          </div>
        </div>
</body></html>
